<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - SOC BHXH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 card p-5 shadow-sm border-0 rounded-3">
                <div class="text-center mb-4">
                    <h3 class="text-primary fw-bold">HỆ THỐNG SOC BHXH</h3>
                    <p class="text-muted">Đăng nhập để vào bảng điều khiển</p>
                </div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tài khoản</label>
                        <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập..." required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Mật khẩu</label>
                        <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu..." required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">ĐĂNG NHẬP</button>
                </form>

                <div id="errorMessage" class="alert alert-danger mt-3 d-none" role="alert"></div>
            </div>
        </div>
    </div>
    <script type="module" src="../js/login.js"></script>
</body>
</html>
