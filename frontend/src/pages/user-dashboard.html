<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - BHXH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/animations.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand fw-bold"><i class="fas fa-user me-2"></i>User Dashboard</span>
            <div class="d-flex gap-2">
                <button id="btnOpenSubmitPage" class="btn btn-warning btn-sm fw-semibold" type="button">
                    <i class="fas fa-file-circle-plus me-1"></i>Nộp hồ sơ
                </button>
                <button id="btnOpenPaymentPage" class="btn btn-info btn-sm fw-semibold" type="button">
                    <i class="fas fa-wallet me-1"></i>Đóng phí BHXH
                </button>
                <button id="btnLogout" class="btn btn-outline-light btn-sm" type="button">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-white fw-bold">Thông tin cá nhân</div>
                    <div class="card-body">
                        <div id="profileAlert" class="alert d-none" role="alert"></div>
                        <div id="profileStatus" class="small text-muted mb-3">Đang tải hồ sơ...</div>

                        <form id="profileForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Họ và tên</label>
                                <input type="text" class="form-control" name="fullName" required>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Ngày sinh</label>
                                    <input type="date" class="form-control" name="dateOfBirth" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Giới tính</label>
                                    <select class="form-select" name="gender" required>
                                        <option value="">Chọn giới tính</option>
                                        <option value="Nam">Nam</option>
                                        <option value="Nu">Nữ</option>
                                        <option value="Khac">Khác</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">CCCD</label>
                                    <input type="text" class="form-control" name="cccd" minlength="9" maxlength="12" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Số điện thoại</label>
                                    <input type="text" class="form-control" name="phoneNumber" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Địa chỉ</label>
                                    <input type="text" class="form-control" name="address" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Mã số BHXH</label>
                                    <input type="text" class="form-control" name="bhxhCode" pattern="^[0-9]{10}$" maxlength="10" inputmode="numeric" required>
                                </div>
                            </div>
                            <div class="d-grid mt-3">
                                <button id="btnSaveProfile" class="btn btn-primary fw-semibold" type="submit">
                                    <i class="fas fa-save me-1"></i>Lưu thông tin
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <span class="fw-bold">Hồ sơ đã nộp</span>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th>Mã hồ sơ</th>
                                        <th>Trạng thái</th>
                                        <th>Ngày nộp</th>
                                        <th>Cập nhật</th>
                                        <th class="text-end">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody id="applicationTableBody">
                                    <tr>
                                        <td colspan="5" class="text-muted text-center py-3">Đang tải...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mt-3">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <span class="fw-bold">Thanh toán BHXH</span>
                        <button id="btnOpenPaymentPageFooter" class="btn btn-outline-primary btn-sm">Đi tới đóng phí</button>
                    </div>
                    <div class="card-body">
                        <div id="paymentSummary" class="small text-muted">Đang tải trạng thái thanh toán...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="applicationDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Chi tiết hồ sơ đã nộp</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="detailMeta" class="small text-muted mb-3"></div>

                    <h6 class="fw-bold">Thông tin hồ sơ</h6>
                    <div id="detailProfileContainer" class="mb-3"></div>

                    <h6 class="fw-bold">Timeline xử lý</h6>
                    <ul id="detailTimeline" class="list-group">
                        <li class="list-group-item text-muted">Chọn hồ sơ để xem chi tiết.</li>
                    </ul>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/user-dashboard.js"></script>
    <script src="/js/animations.js"></script>
</body>
</html>
