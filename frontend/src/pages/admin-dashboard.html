<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand fw-bold"><i class="fas fa-user-shield me-2"></i>Admin Dashboard</span>
            <button id="btnLogout" class="btn btn-outline-light btn-sm">Đăng xuất</button>
        </div>
    </nav>

    <main class="container py-4">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white fw-bold">Tạo tài khoản mới</div>
                    <div class="card-body">
                        <form id="createUserForm">
                            <div class="mb-2">
                                <label class="form-label">Username</label>
                                <input class="form-control" name="username" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Họ và tên</label>
                                <input class="form-control" name="fullName" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Role</label>
                                <select class="form-select" name="role" required>
                                    <option value="User">User</option>
                                    <option value="Employee">Employee</option>
                                    <option value="Security">Security</option>
                                    <option value="Admin">Admin</option>
                                </select>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Email</label>
                                <input class="form-control" name="email" type="email">
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Số điện thoại</label>
                                <input class="form-control" name="phoneNumber">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mật khẩu (bỏ trống để tự sinh)</label>
                                <input class="form-control" name="password" type="password">
                            </div>
                            <button class="btn btn-dark w-100" type="submit">Tạo tài khoản</button>
                        </form>
                        <div id="createUserResult" class="alert mt-3 d-none"></div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white fw-bold d-flex justify-content-between">
                        <span>Quản lý tài khoản</span>
                        <button id="btnReloadUsers" class="btn btn-sm btn-outline-secondary">Tải lại</button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Username</th>
                                        <th>Họ và tên</th>
                                        <th>Role</th>
                                        <th>Trang thái</th>
                                        <th>Hành động</th>
                                    </tr>
                                </thead>
                                <tbody id="adminUserTableBody">
                                    <tr><td colspan="6" class="text-muted">Đang tải...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="/js/admin-dashboard.js"></script>
</body>
</html>
