<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu trực tuyến - BHXH Việt Nam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .search-box { background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.07); padding: 30px; }
        .nav-pills .nav-link { color: #555; font-weight: bold; border-radius: 50px; padding: 10px 20px; }
        .nav-pills .nav-link.active { background-color: #0d6efd; color: white; }
        .lookup-card { border-left: 5px solid #0d6efd; }
        .lookup-card.bhyt { border-left-color: #198754; }
        .lookup-key { font-size: 0.95rem; color: #6c757d; }
        .timeline-card { border-left: 5px solid #0d6efd; }
        .timeline-card.bhyt { border-left-color: #198754; }
        .result-section { margin-top: 1.5rem; }
        .form-note { font-size: 0.95rem; color: #495057; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/index.html"><i class="fas fa-landmark me-2"></i>BHXH Việt Nam</a>
            <div class="ms-auto"><a href="/index.html" class="btn btn-outline-secondary btn-sm"><i class="fas fa-home me-1"></i>Về trang chủ</a></div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-10 search-box">
                <h3 class="text-center text-primary fw-bold mb-4 text-uppercase">Cổng Tra Cứu Trực Tuyến</h3>

                <ul class="nav nav-pills justify-content-center mb-4" id="searchTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active mx-2" data-bs-toggle="tab" data-bs-target="#bhxh-tab" type="button"><i class="fas fa-history me-1"></i> Quá trình BHXH</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link mx-2" data-bs-toggle="tab" data-bs-target="#bhyt-tab" type="button"><i class="fas fa-id-card me-1"></i> Thẻ BHYT</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="bhxh-tab">
                        <div class="alert alert-info mb-4">
                            <i class="fas fa-info-circle me-2"></i>
                            Nhập mã BHXH và CCCD để xác thực. OTP là tuỳ chọn bảo mật cao, giúp kiểm tra thêm chế độ truy cập nếu được kích hoạt.
                        </div>

                        <form id="bhxhSearchForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="fw-bold mb-2">Mã số BHXH</label>
                                    <input id="bhxhQueryInput" type="text" class="form-control form-control-lg" placeholder="Nhập mã số BHXH...">
                                </div>
                                <div class="col-md-6">
                                    <label class="fw-bold mb-2">CMND / CCCD</label>
                                    <input id="bhxhCccdInput" type="text" class="form-control form-control-lg" placeholder="Nhập CMND hoặc CCCD...">
                                </div>
                                <div class="col-md-6">
                                    <label class="fw-bold mb-2">OTP (tuỳ chọn)</label>
                                    <input id="bhxhOtpInput" type="text" class="form-control form-control-lg" placeholder="Nhập mã OTP nếu có...">
                                </div>
                                <div class="col-md-6 d-flex align-items-end">
                                    <button id="bhxhSearchBtn" type="button" class="btn btn-primary w-100 fw-bold py-2">TRA CỨU</button>
                                </div>
                            </div>
                        </form>

                        <div id="bhxhResults" class="result-section"></div>
                    </div>

                    <div class="tab-pane fade" id="bhyt-tab">
                        <div class="alert alert-success mb-4">
                            <i class="fas fa-heartbeat me-2"></i>
                            Tra cứu thẻ BHYT nhanh giúp bạn kiểm tra hiệu lực thẻ, nơi khám chữa bệnh và quyền lợi chi trả.
                        </div>

                        <form id="bhytSearchForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="fw-bold mb-2">Mã thẻ BHYT</label>
                                    <input id="bhytCardInput" type="text" class="form-control form-control-lg" placeholder="VD: GD4012345678901...">
                                </div>
                                <div class="col-md-6">
                                    <label class="fw-bold mb-2">Họ và tên</label>
                                    <input id="bhytNameInput" type="text" class="form-control form-control-lg" placeholder="Nguyễn Văn A">
                                </div>
                                <div class="col-md-6">
                                    <label class="fw-bold mb-2">Ngày sinh</label>
                                    <input id="bhytDobInput" type="date" class="form-control form-control-lg">
                                </div>
                                <div class="col-md-6 d-flex align-items-end">
                                    <button id="bhytSearchBtn" type="button" class="btn btn-success w-100 fw-bold py-2">TRA CỨU</button>
                                </div>
                            </div>
                        </form>

                        <div id="bhytResults" class="result-section"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/animations.js"></script>
    <script type="module" src="/js/tracuu.js"></script>
</body>
</html>
