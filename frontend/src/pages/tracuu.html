<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu trực tuyến - BHXH Việt Nam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .search-box { background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 30px; }
        .nav-pills .nav-link { color: #555; font-weight: bold; border-radius: 50px; padding: 10px 20px; }
        .nav-pills .nav-link.active { background-color: #0056b3; color: white; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="../index.html"><i class="fas fa-landmark me-2"></i>BHXH Việt Nam</a>
            <div class="ms-auto"><a href="../index.html" class="btn btn-outline-secondary btn-sm"><i class="fas fa-home me-1"></i>Về trang chủ</a></div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 search-box">
                <h3 class="text-center text-primary fw-bold mb-4 text-uppercase">Cổng Tra Cứu Trực Tuyến</h3>
                
                <ul class="nav nav-pills justify-content-center mb-4" id="searchTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active mx-2" data-bs-toggle="tab" data-bs-target="#bhxh-tab" type="button"><i class="fas fa-history me-1"></i> Quá trình BHXH</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link mx-2" data-bs-toggle="tab" data-bs-target="#bhyt-tab" type="button"><i class="fas fa-id-card me-1"></i> Thẻ BHYT</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="bhxh-tab">
                        <form>
                            <div class="mb-3">
                                <label class="fw-bold mb-2">Mã số BHXH / CCCD</label>
                                <input type="text" class="form-control form-control-lg" placeholder="Nhập mã số cần tra cứu...">
                            </div>
                            <button type="button" class="btn btn-primary w-100 fw-bold py-2" onclick="alert('Tính năng đang được tích hợp Backend (Nhóm A)')">TRA CỨU</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="bhyt-tab">
                        <form>
                            <div class="mb-3">
                                <label class="fw-bold mb-2">Mã thẻ BHYT</label>
                                <input type="text" class="form-control form-control-lg" placeholder="VD: GD4012345678901...">
                            </div>
                            <div class="row mb-3">
                                <div class="col-6">
                                    <label class="fw-bold mb-2">Họ và tên</label>
                                    <input type="text" class="form-control" placeholder="Nguyễn Văn A">
                                </div>
                                <div class="col-6">
                                    <label class="fw-bold mb-2">Ngày sinh</label>
                                    <input type="date" class="form-control">
                                </div>
                            </div>
                            <button type="button" class="btn btn-primary w-100 fw-bold py-2" onclick="alert('Tính năng đang được tích hợp Backend (Nhóm A)')">TRA CỨU</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
