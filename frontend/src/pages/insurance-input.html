<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nộp hồ sơ BHXH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/animations.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand fw-bold"><i class="fas fa-file-pen me-2"></i>Nộp hồ sơ BHXH</span>
            <div class="d-flex gap-2">
                <button id="btnBackDashboard" class="btn btn-outline-light btn-sm" type="button">Quay lại bảng thông tin</button>
                <button id="btnLogout" class="btn btn-outline-light btn-sm" type="button">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white fw-bold">Form nop ho so </div>
                    <div class="card-body">
                        <p class="text-muted small mb-3">
                            Bạn có thể nhập mới hoặc sửa hồ sơ, sau đó bấm "Nộp hồ sơ".
                        </p>

                        <form id="insuranceInputForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Họ và tên</label>
                                    <input type="text" class="form-control" name="fullName" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Ngày sinh</label>
                                    <input type="date" class="form-control" name="dateOfBirth" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Giới tính</label>
                                    <select class="form-select" name="gender" required>
                                        <option value="">Chọn giới tính</option>
                                        <option value="Nam">Nam</option>
                                        <option value="Nu">Nữ</option>
                                        <option value="Khac">Khác</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">CCCD</label>
                                    <input type="text" class="form-control" name="cccd" minlength="9" maxlength="12" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Số điện thoại</label>
                                    <input type="text" class="form-control" name="phoneNumber" required>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label fw-semibold">Địa chỉ</label>
                                    <input type="text" class="form-control" name="address" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Mã số BHXH (10 số)</label>
                                    <input type="text" class="form-control" name="bhxhCode" pattern="^[0-9]{10}$" maxlength="10" inputmode="numeric" required>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label fw-semibold">Ten cong ty</label>
                                    <input type="text" class="form-control" name="companyName" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Luong (VND)</label>
                                    <input type="number" class="form-control" name="salary" min="0" step="1000" inputmode="numeric" required>
                                </div>
                            </div>

                            <div class="d-grid mt-4">
                                <button id="btnSubmitData" class="btn btn-primary fw-bold" type="submit">
                                    <i class="fas fa-paper-plane me-2"></i>Nộp hồ sơ
                                </button>
                            </div>
                        </form>

                        <div id="resultBox" class="alert mt-3 d-none" role="alert"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="/js/insurance-input.js"></script>
    <script src="/js/animations.js"></script>
</body>
</html>
